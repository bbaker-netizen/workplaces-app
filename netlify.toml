[build]
  # Run pending Drizzle migrations before the Next.js build so the
  # deployed code never sees a stale schema. The migrate script is a
  # no-op when DATABASE_URL is unset (preview builds without a DB).
  command = "node scripts/migrate-on-deploy.mjs && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"  # Disable npm install; pnpm handles deps via lockfile.
  PNPM_FLAGS = "--frozen-lockfile"
  # Netlify's secrets scanner inspects build artifacts for accidentally
  # exposed secrets. Next.js inlines `process.env.X` references into
  # the server bundle at build time — that's expected and the bundle
  # ships only to serverless functions, not the browser. Whitelist the
  # server-side env keys we know are baked into the server bundle so
  # the scanner doesn't false-positive the deploy.
  SECRETS_SCAN_OMIT_KEYS = "ANTHROPIC_API_KEY,DATABASE_URL,DATABASE_URL_OWNER,CLERK_SECRET_KEY,CLERK_WEBHOOK_SECRET,RESEND_API_KEY,RESEND_FROM_EMAIL,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,CRON_SECRET,MCP_BEARER_TOKEN,FIREFLIES_API_KEY,EMBEDDED_APPS_TOKEN_SECRET,INNGEST_SIGNING_KEY,INNGEST_EVENT_KEY,NETLIFY_BLOBS_SITE_ID,NETLIFY_BLOBS_TOKEN,QBO_CLIENT_ID,QBO_CLIENT_SECRET,QBO_REDIRECT_URI,QBO_ENVIRONMENT,QBO_WEBHOOK_VERIFIER_TOKEN,TOKEN_ENCRYPTION_KEY,EA_GATEWAY_SECRET"
  # Belt-and-suspenders: also skip the .next cache directory so build
  # cache scanning doesn't pick up server-side env values inlined
  # during incremental builds.
  SECRETS_SCAN_OMIT_PATHS = ".next/cache/**,.netlify/**"

# Netlify's official Next.js plugin handles routing, SSR, image
# optimization, and edge functions for the App Router.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Phase 1.4: Netlify Scheduled Functions live under `netlify/functions/`.
# The Next.js plugin owns the build artifacts in `.next/`; the
# `functions` directory is a separate, plain-Node target.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Background server actions that talk to Claude (document import,
# soul-file insights, etc.) can take 30-90 seconds. Bump the timeout
# beyond Netlify's default 10s so the document import flow doesn't
# 504 mid-conversion. Effective ceiling depends on the Netlify plan
# (26s on free, 60s on Pro, 15min on enterprise).
[functions."___netlify-server-handler"]
  timeout = 60

[functions."*"]
  timeout = 60


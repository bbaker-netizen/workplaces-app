[build]
  # Run pending Drizzle migrations before the Next.js build so the
  # deployed code never sees a stale schema. The migrate script is a
  # no-op when DATABASE_URL is unset (preview builds without a DB).
  command = "node scripts/migrate-on-deploy.mjs && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"  # Disable npm install; pnpm handles deps via lockfile.
  PNPM_FLAGS = "--frozen-lockfile"

# Netlify's official Next.js plugin handles routing, SSR, image
# optimization, and edge functions for the App Router.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Phase 1.4: Netlify Scheduled Functions live under `netlify/functions/`.
# The Next.js plugin owns the build artifacts in `.next/`; the
# `functions` directory is a separate, plain-Node target.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
